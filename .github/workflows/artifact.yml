name: Artifact Demo

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create version file
        run: |
          echo "Version 1.0" > version.txt
          cat version.txt

      - name: Show files
        run: ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-file
          path: version.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Show files before download
        run: ls -la

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: version-file

      - name: Show files after download
        run: ls -la

      - name: Read version
        run: cat version.txt
